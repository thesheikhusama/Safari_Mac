name: Safari Testing

on:
  workflow_dispatch:
    inputs:
      test_url:
        description: 'Base URL (e.g. https://your-website.com)'
        required: true
        default: 'https://your-website.com'
      pages:
        description: 'Pages to test, comma separated (e.g. /,/about,/contact)'
        required: true
        default: '/'
      viewports:
        description: 'Viewports to test'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - desktop only
          - mobile only

jobs:
  test-safari:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/Library/Caches/ms-playwright
          key: playwright-webkit-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install WebKit (only if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install webkit --with-deps

      - name: Enable Safari WebDriver
        run: |
          sudo safaridriver --enable
          defaults write com.apple.Safari AllowRemoteAutomation 1

      - name: Run Safari tests
        env:
          TEST_URL: ${{ github.event.inputs.test_url }}
          TEST_PAGES: ${{ github.event.inputs.pages }}
          TEST_VIEWPORTS: ${{ github.event.inputs.viewports }}
        run: node tests/safari-test.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safari-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 14
